<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Chai aur code</h1>
    <button id = "stop">Stop</button>
    <button id="start">Start</button>

</body>
<script>
    const azfar = function() {
        console.log("Azfar")
    }
    const chagetext = function(){
        document.querySelector("h1").innerHTML="Testjs series"

    }
    
//    if giving or holding the set timeout in a variable it does not changes
// the execution context for it so doen't matter

    
    const changeme = setInterval(azfar , 1000)
    document.querySelector("#stop").addEventListener("click" ,function (){
        clearInterval(changeme)


    })
    document.querySelector("#start").addEventListener("click" , function (){
        changeme = setInterval(azfar , 1000)
        document.querySelector("#stop").addEventListener("click" , function(){
            clearInterval(changeme)
        })
    })



</script>
</html>
