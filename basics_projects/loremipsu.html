<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator</title>
</head>
<style>
    
    header{
        text-align: center;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        color: rgb(10, 229, 10);
        font-size: 2em;
        padding: 10px;
        margin-bottom: 15px;
        box-shadow: 0px 4px 8px 0px
            rgba(0 ,0 ,0 ,0.2);
    }
    #GLI{
        display: grid;
        justify-content: center;
        height: 80vh;
        box-shadow: 0px 4px 8px 0px
            rgba(0 , 0 , 0 ,0.3);
          

    }
    #para{
        width: 500px;
    }
    #tag{
        display: grid;
        margin-bottom: 10px;
    }
    #tag1{
        height:20px;
    }
    #inh{
        display: grid;
        margin-bottom: 10px;
    }
    #inh2{
        height:20px;
    }
    #button{
        display: grid;
        margin-bottom: 10px;
        height: 30px;
    }
    #area{
        height:80px
    }

    
</style>
<body>
    <Header>
        <div id="head">
            <P>Lorem Ipsum Generator</P>
        </div>
    </Header>
    <div id="GLI">
        <div style="display: grid;" id="para" >
            <label class="lb" for="">Paragraph</label>     

            <input type="range" name="" id="paratag" min="0" max="10">
            
        </div>
        <div id="wpp" style="display: grid;">
            <label for="wppt">Words Per Paragraph</label>
            <input type="range" name="" id="wppt" min="0" , max="8">

        </div>
        <div id="tag">
            <label for="tag1">Tags:</label>
            
            <select name="" id="tag1">
                <option value="p">P</option>
                <option value="pre">pre</option>
            </select>

        </div>
        <div id="inh">
            <label for="ihtml">Include HTML:</label>
            <select name="" id="inh2">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>
        <div id="button">
            <button id="generate">Generate Lorem Ipsum</button>
        </div>

        <textarea name="" id="area"></textarea>



        

    </div>

    
</body>
<script>
    const ranp = document.querySelector("#paratag")
    const btn = document.getElementById("generate")
    const worpp = document.querySelector("#wppt")
    btn.addEventListener("click", ()=>{
        const words = ranp.value
        console.log(words);
        const wpp = worpp;
        console.log(wpp)
        
    })
</script>
</html>
