<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Click Animation</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0 ;
    }

    body{
        height: 100vh;
        width:100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: bisque;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        



    }
    .card{
        background-image: linear-gradient(50deg , aqua 0% , rgb(43, 43, 226) 100%);
        width: 60%;
        text-align: center;
        border-radius: 10px;
        box-shadow: black 5px 8px 4px ;

    }
    .heading{
        font-size: 1.5rem;
        margin: 3rem 0px;
        
        text-align: center;
        color: green;
        animation: headinganimation 2s ease-in-out;


    }
    .text{
        color: rgb(22, 22, 238);
        margin:1.5rem 0px;
    }
    .btn{
        margin-bottom:3rem;
        color:white;
        border-radius: 20px;
        background-color: rgb(95, 95, 208);
        padding:.5rem;
    }
    @keyframes headinganimation {
        0%{
            transform: scale(1);
        }
        25%{
            transform: scale(0.8)
        }
        50%{
            transform:scale(1.2)
        }
        75%{
            transform:scale(1.5)
        }
        100%{
            tranform:scale(1)
        }
    }
    .animation{
        animation:buttonanimation 2s ease-in-out
    }
    @keyframes  buttonanimation{
        0%{
            transform: scale(1);
        }
        25%{
            transform: scale(0.8)
        }
        50%{
            transform:scale(1.2)
        }
        75%{
            transform:scale(1.5)
        }
        100%{
            tranform:scale(1)
        }
        
    }

</style>
<body>
    <div class="card">
        <h1 class="heading">GeekforGeeks</h1>
        <p class="text">Click here for animation </p>
        <button class="btn" id="btn">
            click me
        </button>
    </div>


    
    
</body>
<script>
    const btn = document.getElementById("btn")
    btn.addEventListener("click" , ()=>{
        document.getElementById("btn").classList.add("animation")
        setTimeout(()=>{q
            document.getElementById("btn").classList.remove("animation");

        }, 2000);
    })

</script>
</html>
