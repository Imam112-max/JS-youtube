<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter</title>
</head>
<style>
    #container1{
        text-align: center;
        border:  4px black ;
        padding: 20px;
        box-shadow: 0px 4px 8px 0px
            rgba(0 , 0 , 0 ,0.2);
        border-radius: 5px;
        table-layout: auto;
        color: rgb(76, 237, 76);
        
    }
    #area{
        width: 100%;
        height: 200px;
        display: block;
    }
    #counter{
        margin-top: 10px;
        display: block;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 1em;
        box-shadow: 0px 4px 8px 0px
            rgba(0 , 0 , 0 ,0.2);
        border-radius: 3px;
        margin-bottom: 40px;
        padding: 10px;

    }
   
</style>
<body>
    <header>
        <div id="container1">
            
            <h1>
                GeeksForGeeks
            </h1>
            <h2>
                Word and character count
            </h2>
        </div>
    </header>
    <div id="counter">
        <div>
            <textarea name="" id="area" placeholder="Enter your Text Here"></textarea>

            <p class="result">
                <span id="word">0</span> Words and
                <span id="char">0</span> character
            </p>
        </div>

    </div>

</body>
<script>
    const word = document.getElementById("word");
    const char = document.getElementById("char");
    const text = document.getElementById("area");

    text.addEventListener("input", function () {
        let content = this.value;

        // Character count
        char.textContent = content.length;

        // Remove extra spaces
        content = content.trim();

        // Split into words
        let wordlist = content.split(/\s+/);

        let words = wordlist.filter(function(element){
            return element != '';
        });

        // Word count
        word.textContent = words.length;
    });
</script>
</html>
