<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        
    }
    #main{
        display: block;
        text-align: center;
        background-color: rgb(11, 210, 190);
        width: 100%;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        padding: 20px;

    }
    #power-point{
        height:10px;
        width:0;
        margin-top:10px;
        border-radius:5px;
        transition:0.3s;
    }
</style>
<body>
    <div id="main">
        <div>
           <h1 style="color: rgb(14, 63, 169);">GeeksforGeeks</h1>
        </div>
        <div>
            <pre><h2 style="color: brown;">Password Strength Checker</h2>            
            <h3>Password</h3></pre>



        </div>

        <input id="text" type="text" placeholder="Enter your password">
        <p id="result"></p>

        <div id="power-point"></div>

        
         

    </div>
    
</body>
<script>
    
    const txt = document.getElementById("text");
    const power = document.getElementById("power-point");

    let widthpower = ["1%", "25%", "50%", "75%", "100%"];
    let colorPower = [
        "#D73F40",
        "#DC6551",
        "#F2B84F",
        "#BDE952",
        "#3ba62f"
    ];

    txt.oninput = function() {

        let value = txt.value;
        let point = 0;

        if(value.length >= 6){

            let arrayTest = [
                /[0-9]/,
                /[a-z]/,
                /[A-Z]/,
                /[^0-9a-zA-Z]/
            ];

            arrayTest.forEach((item)=>{
                if(item.test(value)){
                    point++;
                }
            });
        }

        power.style.width = widthpower[point];
        power.style.backgroundColor = colorPower[point];
    };
    
</script>
</html>
