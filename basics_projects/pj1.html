<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    
</head>
<style>
    body{

        background-color: #f2f2f2;
    }
    header{
        background-color: white;

        text-align:center;
        padding:20px;
        box-shadow: 0px 4px 8px 0px

    }
    h1{

    }
    main{

        background-color: #fff;
        box-shadow: 0px 4px 8px
        rgba(0 , 0 , 0 , 0.2);
        border-radius: 10px;

    }
    .options{
        margin-bottom:20px;
    }
    .options label{
        display:block;

    }
    .options input[type='range'],

    .options input[type="number"]{
        width:100%;

        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 13px;
        background-color: #f9f9f9;
        box-shadow:0px 2px 4px 
            rgba(0 , 0 , 0 , 0.1);
        color:#000;
        

    }
    .options select{
        appearance: block;
    }
    .options button {
        display:block;
        width:100%;
        padding:15px;
        background-color: green;
        color:#fff;
        font-size:20px;
        font-weight:bold;
        border:none;
        border-radius:5px;
        cursor:pointer;
        transition:background-color 0.3s
            ease;
        
        
    }
    .options button:hover{
        background-color: rgb(20,107,20);
    }
    .output{
        background-color: #ffffff;
        padding:30px;
        border-radius: 10px;
        border:2px solid crimson;
        min-height:200px;
        box-shadow: 5px 5px 15px 5px
            rgba(0 , 0 , 0 , 0.2);
        color:#333;

    }

</style>
<body>

</html>
