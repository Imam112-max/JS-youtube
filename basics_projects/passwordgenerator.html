<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* style.css */


body {
    background-color: #f8f8f8;
    color: #333;
    font-family: Arial, Helvetica, sans-serif;
}

.generator {
    background-color: #f5f5f5;
    width: 250px;
    margin: 150px auto;
    padding: 20px;
    border-radius: 10px;
}

div.password {
    display: grid;
    grid-template-columns: auto min-content;
    border-radius: 10px;
    overflow: hidden;
}

div.password input {
    padding: 7px 10px;
    background-color: #ddd;
    border: 0;
    color: #333;
}

button {
    background-color: #4caf50;
    color: #fff;
    text-transform: uppercase;
    padding: 5px 15px;
    border: 0;
    border-radius: 10px;
}

div.password button {
    border-radius: 0;
}

div.range {
    margin: 10px 0;
    display: grid;
    grid-template-columns: 1fr min-content;
}

div.range span {
    background-color: #ddd;
    padding: 10px;
    margin-left: 20px;
    min-width: 30px;
    text-align: center;
    border-radius: 10px;
}

div.options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

div.options label {
    display:block;
    background-color: #ddd;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    font-family: sans-serif;
}

button.generate {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

h1 {
    text-align: center;
    color: #4caf50;
}
</style>
<body>
    <h1>
        Password Generator 
    </h1>
    <div class="generator">
        <div class="password">
            <input type="text" value="text">
            <button>Copy</button>
        </div>
        <div class="range">
            <input type="range" name=""  min="4" max="25" value="8"id=""><span>8</span>
        </div>
        <div class="options">
            <div class="option">
                <label for="">
                    <input type="checkbox" name="" id="lowercaseCb" checked>
                    <span>a-z</span>
                </label>
            </div>
            <div class="option">
                <label for="">
                    <input type="checkbox" name="" id="Uppercase" checked>
                    <span>A-Z</span>
                </label>
            </div>
            <div class="option">
                <label for="">
                    <input type="checkbox" name="" id="Number" checked>
                    <span>0-9</span>
                </label>
            </div>
             <div class="option">
                <label for="">
                    <input type="checkbox" name="" id="Symbol" checked>
                    <span>!@#$%^&*</span>
                </label>
            </div>


        </div>
        <button class="generate">Generate</button>
    </div>
</body>
<script>
    function generate(){
        let dictionary = "";
        if(document.getElementById("lowercase").checked){
            dictionary+="abcdefghijklmnopqrstuvwxyz"
        }
        if(document.getElementById("Uppercase").checked){
            dictionary+="ABCDEFGHIJKLMNOPQRSTUVWXYZ"
        }
        if(document.getElementById("number").checked){
            dictionary +="0123456789"
        }
        if(document.getElementById("symbol").checked){
            dictionary+="!@#$%^&*"
        }
        const length = document.querySelector(
            'input[type="range"]'
        ).value;
        if(length<1||dictionary.length===0){
            return;
        }
        let password='';
        for(let i=0; i<length; i++){
            const pos = Math.floor(Math.random()*dictionary.length);
            password+=dictionary[pos]
        }
        document.querySelector(
            "input[type='text']"
        ).value = password

    }
</script>
</html>
