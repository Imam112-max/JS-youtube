<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main{
        text-align: center;

    }
    .generate{
        text-align: center;
        display: block;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        padding: 10px;
    }

</style>
<body>
    <div class="main">
        <h1>
            password Generator
        </h1>
    </div>
    <div class="generate">
        
        <div><input type="text" placeholder="create a password" id="area">
            <button type="submit" id="btn">Generate</button>
        </div>
    </div>
</body>
<script>
    const button = document.getElementById("btn")
    const text = document.getElementById("area")
    let dict = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*"
    let pass = '';
    let length = 12;

    
    button.addEventListener("click" , function generate(){
        for(let i=0; i<length ; i++){
            const pos = Math.floor(Math.random()*dict.length)
            pass +=dict[pos]

        }
        text.value = pass;
        
        
        
    })

</script>
</html>
