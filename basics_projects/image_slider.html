<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image slider</title>
</head>
<style>
    .slide{
        margin:0;
        padding:0;
        font-family: Arial, Helvetica, sans-serif;
        width:100%;
        height:100vh;
        overflow-x: hidden;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
    .slide1{
        background-image: url("https://media.geeksforgeeks.org/wp-content/uploads/20210812221217/pic1.png");
    }
    .slide2{
        background-image: url(
            "https://media.geeksforgeeks.org/wp-content/uploads/20210812221254/pic2.png"
        );
    }
    .slide3{
        background-image: url("https://media.geeksforgeeks.org/wp-content/uploads/20210812221322/pic3.png");
    }
    .arrow{
        cursor:pointer;
        position:absolute;
        top:50%;
        margin-top:-35px;
        width:0;
        height:0;
        border-style:solid;
    }
    #arrow-left{
        border-width:20px 30px 20px 0;
        border-color:transparent #fff transparent  transparent;
        left:0;
        margin-left:20px;
        
    }
    #arrow-right{
        border-width:20px 0 20px 30px;
        border-color:transparent transparent transparent #fff;
        right:0;
        margin-right:20px;
    }
</style>
<body>
    <div id="arrow-left" class="arrow"></div>
    <div class="slide slide1"></div>
    <div class="slide slide2"></div>
    <div class="slide slide3 "></div>
    <div id="arrow-right" class="arrow"></div>

    
</body>
<script>
    let sliderImages = document.querySelectorAll(".slide")
    let arrow_left = document.querySelector("#arrow-left")
    let arrow_right = document.querySelector("#arrow-right") , current = 0;
    // Clear all images
    function reset(){
        for(let i = 0 ; i<sliderImages.length ; i++){
            sliderImages[i].style.display = "none";
        }
    }
    // Initial slide
    function startslide(){
        reset();
        sliderImages[0].style.display = "block";
    }
    // show previous 
    function slideleft(){
        reset();
        sliderImages[current -1 ].style.display = "block";
        current --;
    }
    // show next 
    function slideright(){
        reset();
        sliderImages[current +1].style.display = "block";
        current++;

    }
    // left arrow click 
    arrow_left.addEventListener("click" , function(){
        if(current===0){
            current = sliderImages.length;
        }
        slideleft();
    })
    // Right arrow click
    arrow_right.addEventListener("click" , function(){
        if(current === sliderImages.length -1 ){
            current = -1;
        }
        slideright();
    })
    startslide();
</script>
</html>
