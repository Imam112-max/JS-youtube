<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get the weather data</title>
    <style>
        #body{
            background-color: gray;

        }
        #city{
            
            
            
            text-align: center;
        }
      

    </style>
</head>

<body id="body">
    <div style="align-items: center; align-content: center; text-align: center;">
        <h1 >Get your city weather Forecast </h1>
    </div>
    <form action="" id="city">
        <input type="text" id="city" placeholder="Enter your city name">
        <button type="submit">
            Submit
        </button>
    </form>
    <br>
    <h2 id="result">
        
        
    </h2>
</body>
<script>
    const cityinput = document.querySelector("#city");
    const result = document.querySelector("#result");
    const form = document.querySelector("form");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const cityname = cityinput.value.trim();

        if (cityname === "") {
            result.innerHTML = "Please Enter the value";
        } 
        else {

            const response = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${cityname}&count=1&language=en&format=json`
            );

            const data = await response.json();

            console.log(data);

            if (!data.results) {
                result.innerHTML = "City not found";
            } 
            else {
                result.innerHTML = `
                City: ${data.results[0].name} <br>
                Country: ${data.results[0].country}
            `;
        }
    }
});
</script>
</html>
